services:
  - type: web
    name: foundathon-backend
    runtime: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: FIRMS_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/ecosystem_monitor.db
      - key: FRONTEND_URL
        sync: false
    autoDeploy: true
    healthCheckPath: /health
