services:
  - type: web
    name: foundathon-backend
    runtime: docker
    region: oregon
    plan: standard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DEBUG
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: FIRMS_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/ecosystem_monitor.db
      - key: FRONTEND_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true
    healthCheckPath: /health
